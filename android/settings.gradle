pluginManagement {
    def flutterSdkPath = new Properties()
    file("local.properties").withInputStream { stream ->
        flutterSdkPath.load(stream)
    }
    def flutterSdk = flutterSdkPath.getProperty("flutter.sdk")
    if (flutterSdk == null) {
        throw new GradleException("flutter.sdk not set in local.properties")
    }

    includeBuild("${flutterSdk}/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id("dev.flutter.flutter-plugin-loader") version "1.0.0"
    id("com.android.application") version "8.11.1" apply false
    id("org.jetbrains.kotlin.android") version "2.2.20" apply false
}

include(":app")
